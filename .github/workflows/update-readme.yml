name: Update README (ABC cpp count)

on:
  push:
    paths:
      - "src/**"
      - ".github/workflows/update-readme.yml"
      - "tools/update_readme.sh"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-readme
  cancel-in-progress: true

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
            fetch-depth: 0

      - name: Make tools executable
        run: |
          chmod +x tools/update_readme.sh || true

      - name: Update README block
        env:
          TZ: Asia/Tokyo
        run: |
          bash tools/update_readme.sh

      - name: Commit & push if changed
        run: |
          if ! git diff --quiet README.md; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "chore(readme): auto-update ABC cpp count [skip ci]"
            git push
          else
            echo "No README changes."
          fi