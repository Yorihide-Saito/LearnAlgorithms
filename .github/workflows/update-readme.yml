# .github/workflows/update-readme.yml
name: Update README (ABC cpp count)

on:
  workflow_dispatch: {}      # 手動でも
  # push:
  #   paths:
  #     - "tools/update_readme.sh"     # 例：スクリプト更新時のみ自動起動したいなら限定
  # schedule:
  #   - cron: '0 9 * * *'             # 任意

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-readme
  cancel-in-progress: true

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Make tools executable
        run: chmod +x tools/update_readme.sh || true

      - name: Update README block
        env:
          TZ: Asia/Tokyo
        run: bash tools/update_readme.sh

      - name: Create or update PR
        uses: peter-evans/create-pull-request@v6
        with:
          branch: auto/readme-abc-count
          title: "chore(readme): auto-update ABC cpp count"
          commit-message: "chore(readme): auto-update ABC cpp count [skip ci]"
          body: |
            自動生成: `tools/update_readme.sh`
            - 実行日時 (JST): ${{ env.TZ || 'Asia/Tokyo' }}
          labels: |
            chore
            automation
          signoff: false
          delete-branch: false